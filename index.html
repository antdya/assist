<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Квартирный AI-помощник</title>
  <meta name="description" content="Персональный AI-помощник для покупки квартиры в России. Помогу с бюджетом, ипотекой, районами и выбором квартиры.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-surface-dynamic: #e6e4df;
      --color-divider: #dcd9d5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-active: #0f3638;
      --color-primary-highlight: #cedcd8;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --content-default: 960px;
      --content-wide: 1200px;
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --space-16: 4rem; --space-20: 5rem; --space-24: 6rem;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-hero: clamp(2.6rem, 1rem + 5vw, 5rem);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
      --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
      --color-divider: #262523; --color-border: #393836;
      --color-text: #cdccca; --color-text-muted: #797876;
      --color-text-faint: #5a5957; --color-text-inverse: #2b2a28;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b;
      --color-primary-active: #1a626b; --color-primary-highlight: #313b3b;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }

    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: var(--space-16);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      line-height: 1.65;
      transition: background-color 0.3s, color 0.3s;
    }
    img { display: block; max-width: 100%; height: auto; }
    input, button, textarea, select { font: inherit; color: inherit; }
    h1, h2, h3, h4 { text-wrap: balance; line-height: 1.15; }
    p, li { text-wrap: pretty; }
    button { cursor: pointer; background: none; border: none; }
    a, button, [role="button"], input, textarea {
      transition: color var(--transition-interactive),
                  background var(--transition-interactive),
                  border-color var(--transition-interactive),
                  box-shadow var(--transition-interactive),
                  transform var(--transition-interactive);
    }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── LAYOUT ── */
    .container,
    .container--wide {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding-inline: var(--space-5);
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: oklch(from var(--color-bg) l c h / 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.07);
    }
    .nav__inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding-inline: var(--space-5);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav__logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      text-decoration: none;
      color: var(--color-text);
      font-size: var(--text-sm);
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .nav__logo svg { color: var(--color-primary); }
    .nav__actions { display: flex; align-items: center; gap: var(--space-2); }
    .theme-toggle {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full);
      color: var(--color-text-muted);
      background: transparent;
    }
    .theme-toggle:hover { color: var(--color-text); background: var(--color-surface-offset); }

    /* ── HERO ── */
    .hero {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 80px;
      padding-bottom: var(--space-16);
    }
    .hero__eyebrow {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: var(--space-4);
      text-align: center;
    }
    .hero__title {
      font-family: var(--font-display);
      font-size: var(--text-hero);
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-5);
      text-align: center;
      max-width: 18ch;
      margin-inline: auto;
    }
    .hero__subtitle {
      font-size: var(--text-lg);
      color: var(--color-text-muted);
      font-weight: 400;
      max-width: 60ch;
      line-height: 1.55;
      margin-bottom: var(--space-10);
      text-align: center;
      margin-inline: auto;
    }

    /* ── SCENARIOS ── */
    .scenarios {
      margin-bottom: var(--space-10);
    }
    .scenarios__label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
      text-align: center;
    }
    .scenarios-list {
      display: grid;
      gap: var(--space-3);
    }
    @media (min-width: 900px) {
      .scenarios-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .scenario-card {
      width: 100%;
      text-align: left;
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-2);
      cursor: pointer;
    }
    .scenario-card__title {
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--color-text);
    }
    .scenario-card__text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.6;
    }
    .scenario-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
      background: var(--color-primary-highlight);
    }

    .scenarios__extra {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .scenarios__extra.is-open {
      grid-template-rows: 1fr;
    }
    .scenarios__extra-inner {
      overflow: hidden;
    }
    .scenarios__extra .scenarios-list {
      padding-top: var(--space-3);
    }
    .scenarios__toggle {
      margin-top: var(--space-3);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .scenarios__toggle svg {
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scenarios__toggle.is-open svg { transform: rotate(180deg); }
    .scenarios__toggle:hover { color: var(--color-primary); }

    /* ── SEND BOX ── */
    .send-box {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      max-width: 680px;
      margin-inline: auto;
    }
    .send-input {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      background: var(--color-surface);
      font-size: var(--text-sm);
      color: var(--color-text);
      outline: none;
    }
    .send-input::placeholder { color: var(--color-text-faint); }
    .send-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12);
    }
    .send-btn {
      padding: var(--space-3) var(--space-6);
      background: var(--color-primary);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .send-btn:active { transform: translateY(0); }

    /* ── SCROLL LINK ── */
    .hero__scroll {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      cursor: pointer;
      margin-inline: auto;
      margin-top: var(--space-4);
    }
    .hero__scroll:hover { color: var(--color-primary); }
    .hero__scroll svg {
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    /* ── SECTIONS ── */
    .section {
      padding-block: clamp(var(--space-16), 8vw, var(--space-24));
    }
    .section + .section {
      border-top: 1px solid var(--color-divider);
    }
    .section__label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: var(--space-3);
      text-align: center;
    }
    .section__heading {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--color-text);
      margin-bottom: var(--space-10);
      line-height: 1.1;
      text-align: center;
      max-width: 32ch;
      margin-inline: auto;
    }

    /* ── HELP ITEMS ── */
    .help-grid {
      display: grid;
      gap: var(--space-3);
    }
    @media (min-width: 900px) {
      .help-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: var(--space-6);
      }
    }
    .help-item {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-radius: 0;
      background: transparent;
      transition: background var(--transition-interactive);
    }
    .help-item:hover { background: var(--color-surface); }
    .help-item__icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      margin-top: 2px;
    }
    .help-item__text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.6;
    }
    .help-item__text strong {
      display: block;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 0.15rem;
      font-size: var(--text-sm);
    }

    /* ── FAQ ── */
    .faq-list { display: flex; flex-direction: column; }
    .faq-item {
      border-bottom: 1px solid var(--color-divider);
    }
    .faq-item:first-child { border-top: 1px solid var(--color-divider); }
    .faq-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5) 0;
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--color-text);
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
    }
    .faq-btn:hover { color: var(--color-primary); }
    .faq-btn svg {
      flex-shrink: 0;
      color: var(--color-text-muted);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .faq-btn[aria-expanded="true"] svg { transform: rotate(45deg); }
    .faq-answer {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .faq-answer.is-open { grid-template-rows: 1fr; }
    .faq-answer__inner {
      overflow: hidden;
    }
    .faq-answer__content {
      padding-bottom: var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.7;
      max-width: 66ch;
    }

    /* ── CTA SECTION ── */
    .cta-section {
      padding-block: clamp(var(--space-20), 10vw, var(--space-24));
      text-align: center;
    }
    .cta-section .section__heading { margin-bottom: var(--space-5); }
    .cta-section p {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 44ch;
      margin-inline: auto;
      margin-bottom: var(--space-10);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-8);
      background: var(--color-primary);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .btn-primary:active { transform: translateY(0); }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--color-divider);
      padding-block: var(--space-8);
      text-align: center;
    }
    .footer p {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .hero { padding-bottom: var(--space-12); }
      .send-box { flex-direction: column; }
      .send-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" aria-label="Навигация">
    <div class="nav__inner">
      <a href="#" class="nav__logo" aria-label="На главную">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>КвартАссист</span>
      </a>
      <div class="nav__actions">
        <button class="theme-toggle" data-theme-toggle aria-label="Переключить тему">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42
