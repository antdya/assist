                  transform var(--transition-interactive);

      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

      max-width: var(--content-wide);
      margin-inline: auto;

    }
