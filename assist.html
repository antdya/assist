<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Помощник по покупке квартиры</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    .chat-container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 80vh;
      overflow: hidden;
    }
    .chat-header {
      padding: 12px 16px;
      background: #1976d2;
      color: #fff;
      font-weight: 600;
    }
    .chat-messages {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
      background: #fafafa;
    }
    .message {
      margin-bottom: 8px;
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.user {
      margin-left: auto;
      background: #e3f2fd;
    }
    .message.bot {
      margin-right: auto;
      background: #eeeeee;
    }
    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 8px;
      background: #fff;
    }
    .chat-input input {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #ccc;
      outline: none;
    }
    .chat-input button {
      margin-left: 8px;
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
    }
    .chat-input button:disabled {
      background: #90caf9;
      cursor: default;
    }
  </style>

<body>
  <div class="chat-container">
    <div class="chat-header">
      AI‑помощник по покупке квартиры
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input">
      <input id="userInput" type="text" placeholder="Задайте вопрос, например: Хочу купить квартиру в ипотеку...">
      <button id="sendBtn">Отправить</button>
    </div>
  </div>

  <script src="faqData.js"></script>
  <script src="chatBot.js"></script>
