<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дом — AI-помощник по покупке жилья</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --space-20: 5rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --bg-page: #FFFFFF;
            --bg-surface: #F9FAFB;
            --bg-surface-hover: #F3F4F6;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB;
            --accent-primary: #000000;
            --accent-primary-hover: #1F2937;
            --accent-soft: #F3F4F6;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LAYOUT --- */
        header {
            padding: var(--space-4) var(--space-6);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-weight: 600;
            font-size: var(--text-base);
            color: var(--text-primary);
            text-decoration: none;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: var(--space-8) var(--space-6);
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        /* --- MESSAGES --- */
        .message {
            display: flex;
            gap: var(--space-4);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--accent-soft);
            color: var(--text-secondary);
        }

        .message.user .avatar {
            background: var(--accent-primary);
            color: white;
        }

        .content {
            max-width: 85%;
            font-size: var(--text-base);
        }

        .message.user .content {
            background: var(--bg-surface);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
        }

        .message.assistant .content {
            padding-top: var(--space-1);
        }

        /* --- INPUT AREA --- */
        footer {
            padding: var(--space-4) var(--space-6) var(--space-8);
            background: var(--bg-page);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            transition: var(--transition-base);
            padding: var(--space-1);
        }

        .input-wrapper:focus-within {
            border-color: var(--text-tertiary);
            box-shadow: var(--shadow-sm);
        }

        textarea {
            width: 100%;
            padding: var(--space-3) var(--space-12) var(--space-3) var(--space-4);
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: var(--text-base);
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 200px;
            display: block;
        }

        .send-btn {
            position: absolute;
            right: var(--space-2);
            bottom: var(--space-2);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--accent-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .send-btn:hover {
            background: var(--accent-primary-hover);
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-20) 0;
            gap: var(--space-6);
        }

        .welcome-title {
            font-size: var(--text-xl);
            font-weight: 600;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i data-lucide="home"></i>
            Дом
        </a>
    </header>

    <main id="main">
        <div class="chat-container" id="chat-container">
            <!-- Welcome screen will be hidden if scenario is active -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="avatar" style="width: 48px; height: 48px;">
                    <i data-lucide="sparkles"></i>
                </div>
                <h1 class="welcome-title">Чем я могу помочь?</h1>
            </div>
        </div>
    </main>

    <footer>
        <div class="input-wrapper">
            <textarea placeholder="Спросите о чем угодно..." id="chat-input" rows="1"></textarea>
            <button class="send-btn">
                <i data-lucide="arrow-up" style="width: 18px; height: 18px;"></i>
            </button>
        </div>
    </footer>

    <script>
        // Lucide icons
        lucide.createIcons();

        // Scenario data from answers.txt
        const scenarios = {
            "buy": {
                "title": "Как купить квартиру выгодно?",
                "response": "Покупка квартиры — это сложный процесс, состоящий из нескольких этапов. Сначала определите ваш бюджет и способ финансирования (ипотека или наличные). Затем выберите район и тип дома. Важно проверить юридическую чистоту объекта и продавца. Я могу помочь вам с анализом цен в конкретном районе или подготовить чек-лист для осмотра квартиры."
            },
            "invest": {
                "title": "Куда инвестировать в недвижимость?",
                "response": "Инвестиции в недвижимость сейчас требуют точного расчета. Наиболее перспективные направления: 1) Новостройки на ранних стадиях в развивающихся районах, 2) Апартаменты для краткосрочной аренды, 3) Коммерческая недвижимость малого формата. Рекомендую обратить внимание на локации с планируемым открытием новых станций метро или ТПУ."
            },
            "rent": {
                "title": "Как быстро сдать квартиру?",
                "response": "Чтобы сдать квартиру быстро и дорого, выполните три шага: 1) Качественный хоумстейджинг (уберите лишнее, добавьте уют), 2) Профессиональные фотографии при дневном свете, 3) Грамотное описание преимуществ для вашей целевой аудитории. Также важно правильно оценить рыночную стоимость, чтобы не демпинговать, но и не ждать арендатора месяцами."
            }
        };

        function addMessage(text, role) {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const icon = role === 'user' ? 'user' : 'sparkles';
            
            messageDiv.innerHTML = `
                <div class="avatar">
                    <i data-lucide="${icon}"></i>
                </div>
                <div class="content">
                    ${text}
                </div>
            `;
            
            container.appendChild(messageDiv);
            lucide.createIcons();
            
            // Auto scroll
            const main = document.getElementById('main');
            main.scrollTop = main.scrollHeight;
        }

        // Handle URL parameters
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const scenarioKey = urlParams.get('q');
            
            if (scenarioKey && scenarios[scenarioKey]) {
                const scenario = scenarios[scenarioKey];
                
                // Show user message (scenario title)
                setTimeout(() => {
                    addMessage(scenario.title, 'user');
                    
                    // Show assistant response
                    setTimeout(() => {
                        addMessage(scenario.response, 'assistant');
                    }, 600);
                }, 300);
            }
        });

        // Textarea auto-resize
        const textarea = document.getElementById('chat-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
